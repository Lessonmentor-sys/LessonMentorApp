<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teacher Login | Lesson Mentor</title>
    <link rel="icon" type="image/png" href="/assets/lessonmentor-favicon.png">
    <link rel="stylesheet" href="../styles.css?v=live9">
  </head>
  <body class="portal-login-page">
    <main class="login-shell">
      <section class="login-card">
        <a class="landing-brand" href="/">
          <img class="brand-logo-image" src="/assets/lessonmentor-logo.png" alt="Lesson Mentor logo">
          <span><strong>Lesson Mentor</strong><small>Teacher Portal</small></span>
        </a>
        <h1>Teacher Login</h1>
        <p>Generate lessons, launch assessments, manage student profiles, and browse the strategy library and question bank.</p>
        <form class="login-form">
          <label>Email <input type="email" placeholder="teacher@school.org"></label>
          <label>Password <input type="password" placeholder="Password"></label>
          <a class="primary-button login-link" href="/teacher/dashboard.html">Continue to Teacher Dashboard</a>
        </form>
        <a class="portal-logout-link" href="/">Back To Home</a>
      </section>
    </main>
  </body>
</html>
