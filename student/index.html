<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Login | Lesson Mentor</title>
    <link rel="icon" type="image/png" href="/assets/lessonmentor-favicon.png">
    <link rel="stylesheet" href="../styles.css?v=live2">
  </head>
  <body class="portal-login-page student-login">
    <main class="login-shell">
      <section class="login-card">
        <a class="landing-brand" href="/">
          <img class="brand-logo-image" src="/assets/lessonmentor-logo.png" alt="Lesson Mentor logo">
          <span><strong>Lesson Mentor</strong><small>Student Portal</small></span>
        </a>
        <h1>Student Login</h1>
        <p>Students use their ID to complete the learning-style assessment assigned by the teacher.</p>
        <form class="login-form">
          <label>Student ID <input type="text" placeholder="Enter student ID"></label>
          <label>Class Code <input type="text" placeholder="Optional class code"></label>
          <a class="primary-button login-link" href="/teacher/dashboard.html#student-view">Continue to Assessment</a>
        </form>
        <a class="portal-logout-link" href="/">Log Out</a>
      </section>
    </main>
  </body>
</html>
