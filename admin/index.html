<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Owner Admin | Lesson Mentor</title>
    <link rel="stylesheet" href="../styles.css?v=live2">
  </head>
  <body class="portal-login-page admin-login">
    <main class="login-shell">
      <section class="login-card">
        <a class="landing-brand" href="/">
          <span class="brand-mark">LM</span>
          <span><strong>Lesson Mentor</strong><small>Owner Admin</small></span>
        </a>
        <h1>Owner Admin Login</h1>
        <p>Manage school accounts, teacher accounts, billing status, global library content, and question bank updates.</p>
        <form class="login-form">
          <label>Email <input type="email" placeholder="owner@lessonmentor.app"></label>
          <label>Password <input type="password" placeholder="Password"></label>
          <a class="primary-button login-link" href="/teacher/dashboard.html#admin-view">Continue to Admin Dashboard</a>
        </form>
      </section>
    </main>
  </body>
</html>
