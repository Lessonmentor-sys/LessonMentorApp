<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mentor 360 | Lesson Mentor</title>
    <link rel="icon" type="image/png" href="/assets/lessonmentor-favicon.png">
    <link rel="stylesheet" href="../styles.css?v=live9">
  </head>
  <body class="owner-admin-page">
    <header class="landing-nav">
      <a class="landing-brand" href="/">
        <img class="brand-logo-image" src="/assets/lessonmentor-logo.png" alt="Lesson Mentor logo">
        <span><strong>Lesson Mentor</strong><small>Mentor 360</small></span>
      </a>
      <nav class="landing-links" aria-label="Admin navigation">
        <a href="/">Back To Home</a>
        <a href="/teacher/">Teacher</a>
        <a href="/school/">School</a>
        <a class="portal-logout-link compact" href="/">Log Out</a>
      </nav>
    </header>

    <main class="owner-shell">
      <section class="owner-hero">
        <div>
          <p class="eyebrow">Owner Admin</p>
          <h1>Mentor 360</h1>
          <p>Manage every school account, teacher subscription, billing status, account flag, and global library item from one command center.</p>
        </div>
        <div class="owner-login-card">
          <strong>Owner Login</strong>
          <label>Email <input type="email" value="support@euc2.org"></label>
          <label>Password <input type="password" placeholder="Password"></label>
          <button class="primary-button">Sign in</button>
        </div>
      </section>

      <section class="owner-tabs">
        <button class="teacher-tab active">Schools <span>4</span></button>
        <button class="teacher-tab">Teachers <span>28</span></button>
        <button class="teacher-tab">Billing <span>6</span></button>
        <button class="teacher-tab">Account Flags <span>2</span></button>
        <button class="teacher-tab">Library + Questions <span>56</span></button>
      </section>

      <section class="owner-grid">
        <article class="panel">
          <div class="panel-title-row">
            <h4>School accounts</h4>
            <button class="primary-button">Add school</button>
          </div>
          <div class="owner-edit-list">
            <div class="owner-edit-row">
              <label>School name <input value="Pilot Elementary"></label>
              <label>Seats <input type="number" value="8"></label>
              <label>Status
                <select>
                  <option selected>Active</option>
                  <option>Trial</option>
                  <option>Past due</option>
                  <option>Paused</option>
                </select>
              </label>
              <button class="secondary-button">Save</button>
            </div>
            <div class="owner-edit-row">
              <label>School name <input value="Desert Ridge Middle"></label>
              <label>Seats <input type="number" value="12"></label>
              <label>Status
                <select>
                  <option>Active</option>
                  <option selected>Trial</option>
                  <option>Past due</option>
                  <option>Paused</option>
                </select>
              </label>
              <button class="secondary-button">Save</button>
            </div>
            <div class="owner-edit-row">
              <label>School name <input value="Independent Teacher Plan"></label>
              <label>Seats <input type="number" value="6"></label>
              <label>Status
                <select>
                  <option selected>Active</option>
                  <option>Trial</option>
                  <option>Past due</option>
                  <option>Paused</option>
                </select>
              </label>
              <button class="secondary-button">Save</button>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-title-row">
            <h4>Billing controls</h4>
            <button class="secondary-button">Export receipts</button>
          </div>
          <div class="owner-billing-grid">
            <label>Billing owner <input value="support@euc2.org"></label>
            <label>Plan
              <select>
                <option>Individual Teacher</option>
                <option selected>School License</option>
                <option>District License</option>
              </select>
            </label>
            <label>Renewal date <input type="date" value="2026-08-06"></label>
            <label>Payment status
              <select>
                <option selected>Paid</option>
                <option>Trial</option>
                <option>Past due</option>
                <option>Comped</option>
              </select>
            </label>
          </div>
        </article>

        <article class="panel">
          <div class="panel-title-row">
            <h4>Platform controls</h4>
            <span class="small-pill">Editable</span>
          </div>
          <div class="owner-control-grid">
            <button class="secondary-button">Edit strategy library</button>
            <button class="secondary-button">Edit question bank</button>
            <button class="secondary-button">Manage protected assets</button>
            <button class="secondary-button">Review account flags</button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
