<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>School Login | Lesson Mentor</title>
    <link rel="icon" type="image/png" href="/assets/lessonmentor-favicon.png">
    <link rel="stylesheet" href="../styles.css?v=live2">
  </head>
  <body class="portal-login-page">
    <main class="login-shell">
      <section class="login-card">
        <a class="landing-brand" href="/">
          <img class="brand-logo-image" src="/assets/lessonmentor-logo.png" alt="Lesson Mentor logo">
          <span><strong>Lesson Mentor</strong><small>School Portal</small></span>
        </a>
        <h1>School Login</h1>
        <p>School teams manage setup, student IDs, FERPA-safe access, and school-level account details.</p>
        <form class="login-form">
          <label>Email <input type="email" placeholder="school@district.org"></label>
          <label>Password <input type="password" placeholder="Password"></label>
          <a class="primary-button login-link" href="/teacher/dashboard.html#admin-view">Continue to School Dashboard</a>
        </form>
      </section>
    </main>
  </body>
</html>
